<!doctype html>
<html lang="es-AR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mundo Mascota: Contacto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Atma:wght@300;400;500;600;700&family=Fira+Code:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../CSS/header.css" />
    <link rel="stylesheet" href="../CSS/contact-form.css" />
  </head>

  <body>
    <header class="container">
      <span class="item--marca">
        <img
          src="./../Images/logo.png"
          alt="Gato Atigrado y Perro Border Collie"
        />
        <h1><a href="./index.html">Mundo Mascota</a></h1>
      </span>
      <nav class="item--sub-pagina">
        <ul>
          <li>
            <a href="./about-us.html" target="_self">Sobre Nosotros</a>
          </li>
          <li><a href="./products.html">Productos</a></li>
          <li><a href="./services.html">Servicios</a></li>
          <li><a href="./contact.html">Contactanos</a></li>
        </ul>
      </nav>
      <form action="" method="get" class="item--busqueda">
        <input
          type="text"
          name="product-name"
          placeholder="¿Qué producto estás buscando?"
        />
        <button type="submit">
          <img src="./../Icons/magnifying-glass.svg" alt="Buscar" />
        </button>
      </form>
    </header>
    <main>
      <form
        action="https://formspree.io/f/mredkvdd"
        method="POST"
        class="contact-form"
      >
        <div class="contact-form--shared-container">
          <div class="contact-form--shared-item">
            <label for="user-name">Nombre</label>
            <input
              type="text"
              name="user-name"
              id="user-name"
              minlength="3"
              maxlength="50"
              placeholder="Ingresa tu nombre (obligatorio)"
            />
          </div>
          <div class="contact-form--shared-item">
            <label for="slider">¿Cuánto nos recomendaría del 1 al 10?</label>
            <!-- El oninput lo busque porque quedaba poco intuitivo sino -->
            <input
              type="range"
              name="client-satisfaction"
              id="slider"
              min="1"
              max="10"
              step="1"
              oninput="this.nextElementSibling.value = this.value"
            />
            <output>1</output>
          </div>
        </div>

        <div class="contact-form--big-fields">
          <label for="user-experience-detail"
            >Contanos sobre tu experiencia.</label
          >
          <textarea
            name="user-experience-detail"
            id="user-experience-detail"
            maxlength="500"
            placeholder="Máximo 500 palabras (opcional)"
          ></textarea>
        </div>

        <div class="contact-form--big-fields">
          <label for="user-recommendations"
            >¿Qué te gustaría ver en nuestra tienda?</label
          >
          <textarea
            name="user-recommendations"
            id="user-recommendations"
            maxlength="500"
            placeholder="Máximo 500 palabras (opcional)"
          ></textarea>
        </div>

        <button type="submit">Enviar Formulario</button>
      </form>
    </main>
  </body>
</html>
